name: Generate Content Manifest

on:
  push:
    branches: [main, master]
    paths:
      - 'content/gallery/**'
      - 'content/flowers/**'
      - 'content/literacy/**'
      - '.github/workflows/generate-manifest.yml'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate manifest.json
        run: |
          python3 << 'EOF'
          import os, json, glob
          manifest = {}
          for folder in ['gallery', 'flowers', 'literacy']:
              path = f'content/{folder}'
              if os.path.isdir(path):
                  files = sorted([os.path.basename(f) for f in glob.glob(f'{path}/*.md')])
                  manifest[folder] = files
              else:
                  manifest[folder] = []
          with open('content/manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)
          print("Generated manifest:")
          print(json.dumps(manifest, indent=2))
          EOF

      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/manifest.json
          if git diff --staged --quiet; then
            echo "No changes to manifest"
          else
            git commit -m "chore: auto-generate content manifest"
            git push
          fi
